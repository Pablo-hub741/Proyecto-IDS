version: "3.8"

services:
  suricata:
    build:
      context: .
      dockerfile: Dockerfile.suricata
    network_mode: "host"
    restart: always
    volumes:
      - ./suricata.yaml:/etc/suricata/suricata.yaml
      - ./rules:/etc/suricata/rules
      - ./ids-suricata/logs:/var/log/suricata
  procesador:
    image: python:3.10
    restart: always
    depends_on:
      - suricata
    working_dir: /
    volumes:
      - ./ids-suricata/logs:/var/log/suricata
      - ./procesar_alertas.py:/procesar_alertas.py
    command: ["sh", "-c", "sleep 3 && python3 /procesar_alertas.py"]

